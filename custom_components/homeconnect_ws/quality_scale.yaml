rules:
  # Bronze
  action-setup: done
  appropriate-polling:
    status: done
    comment: |
      This integration is push-based, with one exception: the WiFi signal
      strength sensor, which has no push mechanism at the protocol level at
      all and must be actively polled via /ni/info. SCAN_INTERVAL is set to
      1 hour, since the appliance is stationary and its signal has no reason
      to change minute-to-minute - this avoids adding needless traffic to
      the appliance's connection.
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup:
    status: done
    comment: |
      Type-based split: standalone washers and dryers (EXPECTED_OFFLINE_APPLIANCE_TYPES
      in coordinator.py) keep the old non-blocking setup - connect() runs in a
      background task and setup always succeeds, since these appliances
      routinely cut their own WiFi radio entirely when powered off between
      cycles (confirmed via fork issue #7: a clean WebSocket close code 1000
      followed by dropping off the LAN entirely). Every other appliance type,
      including washer/dryer combos, now blocks setup on a single connect
      attempt and raises ConfigEntryNotReady on failure, letting HA's normal
      retry-with-backoff take over - matching how most other integrations
      behave.

      This reverses an earlier decision (see the design history for issues
      #274/#293) that rejected a type-based split as guesswork for appliance
      categories we don't own (AirConditioner, CleaningRobot, CookProcessor,
      etc.) and went with an unconditional exempt instead, following ESPHome's
      precedent for the same "sleepy device" problem. What changed: issue #7
      turned "washers/dryers might disconnect their WiFi" from a guess into a
      confirmed fact (WiFi radio shutdown, not just the local API closing),
      specifically for washers and dryers - not for the appliance categories
      the earlier reasoning was actually worried about, and not even for
      washer/dryer combos, at least one of which (a Bosch WNC254A0BY) stays
      connected over Wi-Fi while powered off, closer to the dishwasher
      pattern. The exemption is scoped to exactly what's confirmed, not
      widened back into a guess.
  unique-config-entry: done

  # Silver
  action-exceptions: done
  config-entry-unloading: done
  docs-configuration-parameters:
    status: exempt
    comment: |
      The integration does not have configuration options.
  docs-installation-parameters: done
  entity-unavailable:
    status: done
    comment: |
      Heartbeat signals are sent to the device every 30 seconds
      and if the device doesn't respond it's entites are marked
      as unavailable. Exception: standalone washers/dryers routinely
      cut their own WiFi radio entirely when powered off between
      cycles (see test-before-setup) - being unreachable is expected
      for these, not a fault, so their entities stay available through
      a clean code-1000 disconnect. An abnormal drop (any other close
      code, or none seen yet) still correctly marks them unavailable.
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow: done
  test-coverage: done

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info: done
  discovery: done
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: |
      This integration only supports one device per config entry, so dynamic devices are not applicable.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations:
    status: done
    comment: |
      The WiFi signal-strength sensor picks its icon from a Python property
      based on the RSSI magnitude, not icons.json's range selector - the
      value is negative (dBm) and the selector's ascending-threshold model
      doesn't map onto that cleanly. Same reasoning as e.g. huawei_lte's own
      quality_scale.yaml: some numeric-range icon logic isn't expressible
      with icons.json's state/range selectors alone.
  reconfiguration-flow:
    status: exempt
    comment: |
      No need for reconfiguration flow.
  repair-issues:
    status: exempt
    comment: |
      Previously raised a repair issue after a sustained connection outage,
      but removed it. Two reasons: an HA core reviewer's feedback on our
      Powershades integration submission (a similarly local-network device)
      was that "not being able to connect is not worth an issue" - repair
      issues are meant for problems the user needs to act on, and appliance
      connectivity is already fully covered by entity-unavailable, which
      doesn't demand action the way an issue does. Separately, Home Connect
      covers appliance categories we don't own and can't fully reason about
      (see test-before-setup) - we can't be confident an outage is actually
      abnormal for all of them, so treating every sustained disconnect as
      issue-worthy risks false alarms for appliance types that are expected
      to go offline for reasons we don't know about.
  stale-devices:
    status: exempt
    comment: |
      This integration only supports one device per config entry, so stale devices are not applicable.

  # Platinum
  async-dependency: done
  inject-websession:
    status: done
    comment: |
      HomeAppliance now receives Home Assistant's shared clientsession
      (async_get_clientsession) instead of letting home_disconnect create its
      own aiohttp.ClientSession for the local websocket connection.
      home_disconnect already tracked an _owned_session flag before this
      change and only closes a session it created itself, so injecting HA's
      shared session here doesn't risk it being closed out from under other
      integrations.
  strict-typing:
    status: done
    comment: |
      mypy --strict runs against custom_components/homeconnect_ws (see the
      [tool.mypy] config in pyproject.toml and the lint CI workflow). Went
      from 259 errors across 23 files to zero, fixing a handful of real bugs
      found along the way (a missing await that silently no-opped two
      service actions, a step=1 kwarg HA core deliberately typed as
      accepting only None after renaming it to native_step, several
      generator functions annotated with the wrong return type, ~25 config
      flow steps annotated FlowResult instead of ConfigFlowResult).
