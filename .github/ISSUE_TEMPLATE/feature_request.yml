name: Feature request
description: Report a missing feature
labels: ["feature request"]
body:
  - type: markdown
    attributes:
      value: |
        Every entity in this integration has to be reverse engineered from a real appliance's profile data. Entity coverage for the maintainer's own appliances (Thermador dishwasher/oven/freezer) is essentially complete - beyond that, there is no way to add support for a feature, appliance, or brand without the Diagnostics and Device Description/Feature Mapping files from someone who actually owns one. The two fields below aren't optional extras, they're what makes a request actionable at all.
  - type: textarea
    attributes:
      label: Feature Description
      description: |
        Provide a clear description of the feature.
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Before submitting a Feature request, please follow these steps
      description: Please confirm that you have completed the following steps
      options:
        - label: The requested feature is not latest beta release of Home Connect Local.
        - label: The requested feature is available through the HomeConnect App.
        - label: I have checked the [open issues](https://github.com/vemboy200/homeconnect_local_hass/issues) to ensure my issue isn't a duplicate.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Diagnostics information
      placeholder: "drag-and-drop the diagnostics file here"
      description: >-
        [Download the Integration Diagnostics](https://www.home-assistant.io/docs/configuration/troubleshooting/#download-diagnostics) and drag-and-drop that file into the textbox below.
        Diagnostics contain the current Appliance state, so it is best to download Diagnostics while the Appliance is in a specific state or before and after perform an action through the HomeConnect App.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Device Description / Feature Mapping files
      placeholder: "drag-and-drop the *_DeviceDescription.xml and *_FeatureMapping.xml files here"
      description: >-
        See [Requesting a New Feature](https://github.com/vemboy200/homeconnect_local_hass#requesting-a-new-feature) in the README for how to get these.
        Use the **Export Safe Profile** option from the appliance's device page (Settings → Devices & Services → Home Connect Local → gear/settings icon) to get a ZIP with these two files already renamed and safe to attach as-is.
        Alternatively, use the [Home Connect Profile Downloader](https://github.com/bruestel/homeconnect-profile-downloader), rename the two files to remove the MAC address segment from the filename, and attach them here.
        **Do not attach the `.json` file** from the Profile Downloader — it contains your appliance's local encryption key. Export Safe Profile never includes it.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Feature UID (advanced, optional)
      placeholder: "e.g. 5959 (decimal), which is 1747 in hex"
      description: >-
        Optional, but speeds things up a lot: if you [enabled debug logging](https://github.com/vemboy200/homeconnect_local_hass#enabling-debug-logging) and found the UID that corresponds to the feature you want (see the Advanced method in [Requesting a New Feature](https://github.com/vemboy200/homeconnect_local_hass#requesting-a-new-feature)), include it here, along with what it corresponds to.
    validations:
      required: false
